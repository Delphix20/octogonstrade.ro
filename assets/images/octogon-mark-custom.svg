<svg xmlns="http://www.w3.org/2000/svg" viewBox="35 0 680 692" role="img" aria-labelledby="title desc">
  <title id="title">Octogon Strade Construct custom mark</title>
  <desc id="desc">Editable octogonal interlocking mark inspired by the supplied Octogon reference.</desc>
  <style>
    :root {
      --logo-primary: #1f6fd2;
      --logo-primary-dark: #071c38;
      --logo-secondary: #0b3f83;
      --logo-secondary-dark: #041326;
      --logo-accent: #8fc0ff;
      --logo-shadow: rgba(0, 0, 0, 0.28);
      --logo-highlight-opacity: 0;
      --logo-shadow-blur: 20px;
      --logo-nw-x: 0px;
      --logo-nw-y: 0px;
      --logo-ne-x: 0px;
      --logo-ne-y: 0px;
      --logo-se-x: 0px;
      --logo-se-y: 0px;
      --logo-sw-x: 0px;
      --logo-sw-y: 0px;
    }

    .piece {
      filter: drop-shadow(0 14px var(--logo-shadow-blur) var(--logo-shadow));
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 2;
      stroke-linejoin: round;
    }

    .piece-nw {
      fill: url(#grad-nw);
      transform: translate(var(--logo-nw-x), var(--logo-nw-y));
    }

    .piece-ne {
      fill: url(#grad-ne);
      transform: translate(var(--logo-ne-x), var(--logo-ne-y));
    }

    .piece-se {
      fill: url(#grad-se);
      transform: translate(var(--logo-se-x), var(--logo-se-y));
    }

    .piece-sw {
      fill: url(#grad-sw);
      transform: translate(var(--logo-sw-x), var(--logo-sw-y));
    }

    .highlight {
      opacity: var(--logo-highlight-opacity);
      fill: none;
      stroke: var(--logo-accent);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
  <defs>
    <linearGradient id="grad-nw" x1="86" y1="50" x2="504" y2="468" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--logo-primary)" />
      <stop offset="1" stop-color="var(--logo-primary-dark)" />
    </linearGradient>
    <linearGradient id="grad-ne" x1="412" y1="59" x2="689" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--logo-secondary)" />
      <stop offset="1" stop-color="var(--logo-secondary-dark)" />
    </linearGradient>
    <linearGradient id="grad-se" x1="291" y1="368" x2="689" y2="662" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--logo-primary)" />
      <stop offset="1" stop-color="var(--logo-secondary-dark)" />
    </linearGradient>
    <linearGradient id="grad-sw" x1="92" y1="385" x2="367" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--logo-secondary)" />
      <stop offset="1" stop-color="var(--logo-primary-dark)" />
    </linearGradient>
  </defs>

  <g id="octogon-mark">
    <path
      id="piece-north-west"
      class="piece piece-nw"
      d="M174.258 138.875 86.18 227.598 86.14 347.539 86.102 467.484l25.449-26.304c13.996-14.465 105.648-106.387 203.672-204.27 98.023-97.883 179.98-179.945 182.129-182.363l3.902-4.398H262.34Z"
    />
    <path
      id="piece-north-east"
      class="piece piece-ne"
      d="m467.156 114.563-55.07 55.093 73.734 73.98c40.551 40.688 102.696 103.313 138.094 139.165l64.36 65.187.144-107.61c.078-59.183.227-109.004.332-110.71.164-2.731-2.242-5.598-19.984-23.798C620.027 155.871 524.211 59.461 523.266 59.465c-.575.004-25.82 24.797-56.11 55.098Z"
    />
    <path
      id="piece-south-east"
      class="piece piece-se"
      d="M545.461 401.523c-32.5 32.938-65.84 66.817-123.102 125.102-76.23 77.582-89.082 90.652-109.41 111.258-12.086 12.254-21.976 22.55-21.976 22.879 0 .332 50.07.68 111.273.777l111.274.172 63.273-63.922c34.805-35.16 74.129-74.758 87.387-88 21.02-20.988 24.113-24.484 24.113-27.262 0-2.789-4.582-7.867-37.074-41.105a49535.2 49535.2 0 0 1-54.621-55.93l-17.551-18.004Z"
    />
    <path
      id="piece-south-west"
      class="piece piece-sw"
      d="M164.734 417.207c-17.304 17.496-40.672 41.129-51.933 52.508L92.332 490.41 262.34 659.05l52.14-52.762 52.145-52.762-84.648-84.066c-46.555-46.234-84.899-84.066-85.211-84.066-.313-.004-14.727 14.312-32.032 31.812Z"
    />
  </g>

  <g id="editable-highlights" aria-hidden="true">
    <path class="highlight" d="M105 466 495 74" />
    <path class="highlight" d="M430 170 670 411" />
    <path class="highlight" d="M315 638 575 375" />
    <path class="highlight" d="M121 490 196 414" />
  </g>
</svg>
